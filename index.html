<!DOCTYPE html>
<html>
<head>

<style>

.left-wall{

    background-repeat:repeat-y;
    background-size:120px;

    z-index:999;
}

.content{
    margin:0 140px;
    padding:20px;
    font-size: 100px;
    text-align: center;
}

</style>
</head>
